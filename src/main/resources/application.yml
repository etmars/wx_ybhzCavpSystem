server:
  # 本地开发 HTTP 端口；生产使用 application-prod.yml（9065 + HTTPS，Nginx 反代）
  port: 12380

spring:
  application:
    name: wx-ybhz-cavp-system
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  data-dir: ${DATA_DIR:./data}
  # 默认关闭；地图从 parkinglot catalog + 标定服同步到 data/maps（缓存）
  sync-osmandroid-assets: ${SYNC_OSMANDROID_ASSETS:false}
  osmandroid-assets: ${OSMANDROID_ASSETS:}
  map-sync:
    enabled: ${MAP_SYNC_ENABLED:true}
    on-startup: ${MAP_SYNC_ON_STARTUP:true}
  parking:
    nearby-lng: 116.491829413
    nearby-lat: 39.729580309
    nearby-radius: 15000
    default-parking-id: "000002"
    vehicle-id: I1000110
    parking-space-number: B117
    parking-lng: 116.4915732
    parking-lat: 39.7305491
    api-base-url: http://parkinglot.c-avp.com:3000
  calib:
    api-base-url: http://parkinglock.c-avp.com:18181
  navigation:
    arrival-meters: 8.0
    walk-speed-mps: 1.15
  planner:
    base-url: ${PLANNER_BASE_URL:http://127.0.0.1:18080}
  mqtt:
    broker-url: ${MQTT_BROKER_URL:tcp://127.0.0.1:1883}
    enabled: ${MQTT_ENABLED:false}
  config:
    db-path: ${CONFIG_DB_PATH:data/config.db}

logging:
  level:
    com.ybhzcavp: INFO
